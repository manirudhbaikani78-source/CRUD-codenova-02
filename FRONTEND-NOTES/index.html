<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowNotes | Premium Glassmorphic Workspace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated Floating Background Blobs -->
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        
        <!-- Header -->
        <header>
            <h1 class="app-title">GlowNotes</h1>
            <p class="app-subtitle">A beautifully responsive, glassmorphic space to store your thoughts, plans, and ideas.</p>
        </header>

        <!-- Glassmorphic Note Input Form -->
        <form id="noteForm" class="form-card">
            <div class="form-header-row">
                <span class="form-title" id="formTitleText">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                    </svg>
                    Create a Note
                </span>
            </div>

            <div class="input-group">
                <input
                    type="text"
                    id="title"
                    placeholder="Enter Title"
                    required
                    maxlength="60"
                >
            </div>

            <div class="input-group">
                <textarea
                    id="content"
                    placeholder="Write your thoughts..."
                    required
                    maxlength="1000"
                ></textarea>
            </div>

            <!-- Note Theme / Color Selection -->
            <div class="theme-selector-container">
                <span class="theme-label">Select Note Theme:</span>
                <div class="color-options">
                    <label class="color-option opt-indigo" title="Indigo">
                        <input type="radio" name="noteTheme" value="indigo" checked>
                        <span class="color-dot"></span>
                    </label>
                    <label class="color-option opt-rose" title="Rose">
                        <input type="radio" name="noteTheme" value="rose">
                        <span class="color-dot"></span>
                    </label>
                    <label class="color-option opt-emerald" title="Emerald">
                        <input type="radio" name="noteTheme" value="emerald">
                        <span class="color-dot"></span>
                    </label>
                    <label class="color-option opt-amber" title="Amber">
                        <input type="radio" name="noteTheme" value="amber">
                        <span class="color-dot"></span>
                    </label>
                    <label class="color-option opt-cyan" title="Cyan">
                        <input type="radio" name="noteTheme" value="cyan">
                        <span class="color-dot"></span>
                    </label>
                    <label class="color-option opt-violet" title="Violet">
                        <input type="radio" name="noteTheme" value="violet">
                        <span class="color-dot"></span>
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="cancelEditBtn" style="display: none;">
                    Cancel Edit
                </button>
                <button type="submit" class="btn btn-primary" id="submitBtn">
                    <span>Save Note</span>
                </button>
            </div>
        </form>

        <!-- Search Controls -->
        <div class="notes-controls">
            <h2 class="section-title">
                Your Workspace <span class="notes-count" id="notesCount">0</span>
            </h2>
            <div class="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input type="text" id="searchInput" placeholder="Search notes...">
            </div>
        </div>

        <!-- Notes Grid -->
        <div id="notesContainer"></div>

    </div>

    <!-- Custom Glassmorphic Delete Modal -->
    <div class="modal-backdrop" id="deleteModalBackdrop">
        <div class="modal">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </div>
            <h3>Delete Note</h3>
            <p>Are you sure you want to delete this note? This action cannot be undone.</p>
            <div class="modal-buttons">
                <button class="btn btn-secondary" id="cancelDeleteBtn">Cancel</button>
                <button class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
